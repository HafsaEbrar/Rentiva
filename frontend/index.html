<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <title>RentCar</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <header class="navbar">
      <div class="logo">🚗 RentCar</div>

      <nav class="nav-links">
        <a href="#">Ana Sayfa</a>
        <a href="#">Araçlar</a>
        <a href="#">Hakkımızda</a>
        <a href="#">İletişim</a>
      </nav>

      <button class="login-btn">Giriş Yap</button>
    </header>
    <!-- FILTER BAR -->
    <section class="filter-bar">
      <input type="text" placeholder="Araç marka veya model ara..." />

      <select>
        <option>Yakıt Tipi</option>
        <option>Benzin</option>
        <option>Dizel</option>
      </select>

      <select>
        <option>Vites Tipi</option>
        <option>Otomatik</option>
        <option>Manuel</option>
      </select>

      <button class="filter-btn">Filtrele</button>
    </section>
    <!-- VEHICLE LIST -->
    <section class="vehicle-list"></section>
    <script src="js/app.js"></script>
  </body>
</html>
